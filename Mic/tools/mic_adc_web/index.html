<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mic ADC Monitor</title>
  <style>
    :root {
      --paper: #f4efe6;
      --ink: #171717;
      --muted: #6f675c;
      --line: #d8cfc0;
      --panel: #fffaf0;
      --panel-strong: #ede2cf;
      --green: #237a57;
      --amber: #ba6b12;
      --red: #b83f31;
      --cyan: #176e89;
      --shadow: rgba(42, 35, 22, 0.14);
      --meter: 0%;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(23, 23, 23, 0.035) 1px, transparent 1px) 0 0 / 28px 28px,
        linear-gradient(0deg, rgba(23, 23, 23, 0.035) 1px, transparent 1px) 0 0 / 28px 28px,
        var(--paper);
      font-family: "Avenir Next", "DIN Alternate", "Helvetica Neue", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 22px 0 28px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 16px;
      align-items: end;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-family: "DIN Condensed", "Arial Narrow", sans-serif;
      font-size: clamp(2.4rem, 8vw, 5.4rem);
      line-height: 0.9;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      min-width: 210px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9rem;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 0 5px rgba(184, 63, 49, 0.12);
    }

    .status-dot.on {
      background: var(--green);
      box-shadow: 0 0 0 5px rgba(35, 122, 87, 0.14);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(6, max-content) 1fr;
      gap: 8px;
      align-items: center;
      margin: 18px 0;
    }

    .control {
      height: 40px;
      border: 1px solid var(--ink);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      padding: 0 12px;
      box-shadow: 2px 2px 0 var(--ink);
    }

    button.control {
      cursor: pointer;
      min-width: 92px;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    button.control:hover {
      transform: translate(-1px, -1px);
      box-shadow: 3px 3px 0 var(--ink);
      background: #fff4d9;
    }

    button.control:disabled {
      cursor: not-allowed;
      opacity: 0.5;
      transform: none;
      box-shadow: 2px 2px 0 var(--ink);
    }

    .baud {
      width: 112px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 250px;
      gap: 14px;
      align-items: stretch;
    }

    .panel {
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: rgba(255, 250, 240, 0.92);
      box-shadow: 4px 4px 0 var(--ink), 0 18px 38px var(--shadow);
      min-width: 0;
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--ink);
      background: var(--panel-strong);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.82rem;
      text-transform: uppercase;
    }

    .chart-wrap {
      position: relative;
      height: clamp(280px, 46vh, 500px);
      padding: 12px;
    }

    #chart {
      display: block;
      width: 100%;
      height: 100%;
      background: #fffdf7;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    .side {
      display: grid;
      grid-template-rows: auto minmax(220px, 1fr);
      gap: 14px;
      min-width: 0;
    }

    .meter {
      height: 280px;
      padding: 12px;
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 12px;
      align-items: stretch;
    }

    .meter-bar {
      position: relative;
      border: 1px solid var(--ink);
      border-radius: 6px;
      background:
        linear-gradient(180deg, rgba(184, 63, 49, 0.22), rgba(186, 107, 18, 0.22) 45%, rgba(35, 122, 87, 0.22));
      overflow: hidden;
    }

    .meter-fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--meter);
      background: linear-gradient(180deg, var(--red), var(--amber) 45%, var(--green));
      transition: height 0.12s ease;
    }

    .readouts {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      align-content: start;
    }

    .readout {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 8px;
      align-items: baseline;
      border-bottom: 1px solid var(--line);
      padding-bottom: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .readout span {
      color: var(--muted);
      font-size: 0.74rem;
      text-transform: uppercase;
    }

    .readout strong {
      min-width: 0;
      overflow-wrap: anywhere;
      font-size: 1.18rem;
      font-weight: 800;
    }

    .log {
      height: 235px;
      margin: 0;
      padding: 12px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.45;
      background: #181610;
      color: #f1e5c9;
    }

    .empty {
      color: var(--muted);
    }

    @media (max-width: 820px) {
      .topbar,
      .grid,
      .controls {
        grid-template-columns: 1fr;
      }

      .status {
        justify-content: flex-start;
      }

      .controls {
        align-items: stretch;
      }

      .control,
      .baud {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>Mic ADC Monitor</h1>
        <div class="subtitle">GPIO6 / ADC1_CH5 · MIC_ADC serial stream</div>
      </div>
      <div class="status" aria-live="polite">
        <span id="statusDot" class="status-dot"></span>
        <span id="statusText">未连接</span>
      </div>
    </header>

    <section class="controls" aria-label="Serial controls">
      <select id="baudRate" class="control baud" title="Baud rate">
        <option value="115200" selected>115200</option>
        <option value="230400">230400</option>
        <option value="460800">460800</option>
        <option value="921600">921600</option>
      </select>
      <button id="bridgeBtn" class="control" type="button">本地桥接</button>
      <button id="connectBtn" class="control" type="button">浏览器串口</button>
      <button id="allPortsBtn" class="control" type="button">全部串口</button>
      <button id="disconnectBtn" class="control" type="button" disabled>断开</button>
      <button id="demoBtn" class="control" type="button">模拟</button>
      <button id="clearBtn" class="control" type="button">清空</button>
      <div class="empty" id="supportText"></div>
    </section>

    <section class="grid">
      <article class="panel">
        <div class="panel-head">
          <span>RMS / P2P</span>
          <span id="sampleCount">0 samples</span>
        </div>
        <div class="chart-wrap">
          <canvas id="chart"></canvas>
        </div>
      </article>

      <aside class="side">
        <article class="panel">
          <div class="panel-head">
            <span>Live Level</span>
            <span id="streamMode">idle</span>
          </div>
          <div class="meter">
            <div class="meter-bar" aria-label="RMS level">
              <div class="meter-fill"></div>
            </div>
            <div class="readouts">
              <div class="readout"><span>rms</span><strong id="rmsValue">0</strong></div>
              <div class="readout"><span>p2p</span><strong id="p2pValue">0</strong></div>
              <div class="readout"><span>avg</span><strong id="avgValue">0</strong></div>
              <div class="readout"><span>last</span><strong id="lastValue">0</strong></div>
              <div class="readout"><span>min</span><strong id="minValue">0</strong></div>
              <div class="readout"><span>max</span><strong id="maxValue">0</strong></div>
            </div>
          </div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <span>Raw Serial</span>
            <span id="lineCount">0 lines</span>
          </div>
          <pre id="rawLog" class="log"></pre>
        </article>
      </aside>
    </section>
  </main>

  <script>
    const MAX_POINTS = 240;
    const MAX_LOG_LINES = 120;
    const ESP_SERIAL_FILTERS = [
      { usbVendorId: 0x303a },
      { usbVendorId: 0x10c4 },
      { usbVendorId: 0x1a86 },
      { usbVendorId: 0x0403 },
    ];

    const state = {
      port: null,
      reader: null,
      readableClosed: null,
      eventSource: null,
      bridgeWanted: false,
      bridgeReconnectTimer: null,
      reading: false,
      demoTimer: null,
      partialLine: "",
      points: [],
      logLines: [],
      totalSamples: 0,
      totalLines: 0,
    };

    const els = {
      baudRate: document.getElementById("baudRate"),
      bridgeBtn: document.getElementById("bridgeBtn"),
      connectBtn: document.getElementById("connectBtn"),
      allPortsBtn: document.getElementById("allPortsBtn"),
      disconnectBtn: document.getElementById("disconnectBtn"),
      demoBtn: document.getElementById("demoBtn"),
      clearBtn: document.getElementById("clearBtn"),
      statusDot: document.getElementById("statusDot"),
      statusText: document.getElementById("statusText"),
      supportText: document.getElementById("supportText"),
      streamMode: document.getElementById("streamMode"),
      sampleCount: document.getElementById("sampleCount"),
      lineCount: document.getElementById("lineCount"),
      rawLog: document.getElementById("rawLog"),
      rmsValue: document.getElementById("rmsValue"),
      p2pValue: document.getElementById("p2pValue"),
      avgValue: document.getElementById("avgValue"),
      lastValue: document.getElementById("lastValue"),
      minValue: document.getElementById("minValue"),
      maxValue: document.getElementById("maxValue"),
      chart: document.getElementById("chart"),
    };

    const chartCtx = els.chart.getContext("2d");

    /**
     * @brief 设置页面连接状态。
     *
     * 调用方法：串口连接、断开、异常和模拟模式切换时调用。
     * @param {boolean} connected true 表示当前有实时数据源。
     * @param {string} text 显示在状态栏的短文本。
     */
    function setStatus(connected, text) {
      els.statusDot.classList.toggle("on", connected);
      els.statusText.textContent = text;
      els.bridgeBtn.disabled = false;
      els.connectBtn.disabled = connected || !("serial" in navigator);
      els.allPortsBtn.disabled = connected || !("serial" in navigator);
      els.disconnectBtn.disabled = !connected;
    }

    /**
     * @brief 清除本地桥接自动重连定时器。
     *
     * 调用方法：手动重连、主动断开或切换到其他数据源前调用。
     */
    function clearBridgeReconnectTimer() {
      if (!state.bridgeReconnectTimer) {
        return;
      }
      window.clearTimeout(state.bridgeReconnectTimer);
      state.bridgeReconnectTimer = null;
    }

    /**
     * @brief 安排本地桥接自动重连。
     *
     * 调用方法：EventSource 触发 onerror 且用户仍希望保持本地桥接模式时调用。
     * @param {string} reason 显示在状态栏的重连原因。
     */
    function scheduleBridgeReconnect(reason) {
      if (!state.bridgeWanted || state.bridgeReconnectTimer) {
        return;
      }

      els.streamMode.textContent = "bridge";
      setStatus(false, reason);
      state.bridgeReconnectTimer = window.setTimeout(() => {
        state.bridgeReconnectTimer = null;
        if (state.bridgeWanted) {
          connectBridge();
        }
      }, 1000);
    }

    /**
     * @brief 将 MIC_ADC 串口行解析成字段对象。
     *
     * 调用方法：ingestLine() 收到完整串口行后调用。
     * @param {string} line 串口中的一行文本。
     * @returns {object|null} 解析成功返回指标对象，否则返回 null。
     */
    function parseMicLine(line) {
      if (!line.startsWith("MIC_ADC,")) {
        return null;
      }

      const metric = {};
      for (const part of line.split(",").slice(1)) {
        const eqIndex = part.indexOf("=");
        if (eqIndex <= 0) {
          continue;
        }
        const key = part.slice(0, eqIndex).trim();
        const rawValue = part.slice(eqIndex + 1).trim();
        const numericValue = Number(rawValue.replace(/^ADC/, ""));
        metric[key] = Number.isFinite(numericValue) ? numericValue : rawValue;
      }

      return Number.isFinite(metric.rms) && Number.isFinite(metric.p2p) ? metric : null;
    }

    /**
     * @brief 处理一行串口文本并更新页面。
     *
     * 调用方法：readSerialLoop() 组装出完整行后调用；模拟数据也复用本函数。
     * @param {string} line 完整串口行。
     */
    function ingestLine(line) {
      const trimmed = line.trim();
      if (!trimmed) {
        return;
      }

      state.totalLines += 1;
      state.logLines.push(trimmed);
      if (state.logLines.length > MAX_LOG_LINES) {
        state.logLines.shift();
      }
      els.rawLog.textContent = state.logLines.join("\n");
      els.rawLog.scrollTop = els.rawLog.scrollHeight;
      els.lineCount.textContent = `${state.totalLines} lines`;

      const metric = parseMicLine(trimmed);
      if (metric) {
        pushMetric(metric);
      }
    }

    /**
     * @brief 把新的 Mic 指标加入曲线缓存并刷新读数。
     *
     * 调用方法：ingestLine() 成功解析 MIC_ADC 行后调用。
     * @param {object} metric 包含 rms、p2p、avg、last、min、max 等字段。
     */
    function pushMetric(metric) {
      state.points.push({
        rms: metric.rms,
        p2p: metric.p2p,
        avg: metric.avg ?? 0,
        last: metric.last ?? 0,
        min: metric.min ?? 0,
        max: metric.max ?? 0,
      });
      if (state.points.length > MAX_POINTS) {
        state.points.shift();
      }

      state.totalSamples += metric.samples || 0;
      els.sampleCount.textContent = `${state.totalSamples} samples`;
      els.rmsValue.textContent = metric.rms;
      els.p2pValue.textContent = metric.p2p;
      els.avgValue.textContent = metric.avg ?? 0;
      els.lastValue.textContent = metric.last ?? 0;
      els.minValue.textContent = metric.min ?? 0;
      els.maxValue.textContent = metric.max ?? 0;
      document.documentElement.style.setProperty("--meter", `${Math.min(100, metric.rms / 14)}%`);
      drawChart();
    }

    /**
     * @brief 根据容器尺寸同步 canvas 真实像素尺寸。
     *
     * 调用方法：页面加载、窗口尺寸变化和 ResizeObserver 回调时调用。
     */
    function resizeCanvas() {
      const rect = els.chart.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      els.chart.width = Math.max(1, Math.floor(rect.width * dpr));
      els.chart.height = Math.max(1, Math.floor(rect.height * dpr));
      chartCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      drawChart();
    }

    /**
     * @brief 绘制 RMS 与 p2p 实时曲线。
     *
     * 调用方法：pushMetric() 新增数据后调用；resizeCanvas() 尺寸变化后也会调用。
     */
    function drawChart() {
      const width = els.chart.clientWidth;
      const height = els.chart.clientHeight;
      chartCtx.clearRect(0, 0, width, height);

      chartCtx.fillStyle = "#fffdf7";
      chartCtx.fillRect(0, 0, width, height);

      chartCtx.strokeStyle = "#e4dac8";
      chartCtx.lineWidth = 1;
      for (let x = 0; x < width; x += 42) {
        chartCtx.beginPath();
        chartCtx.moveTo(x, 0);
        chartCtx.lineTo(x, height);
        chartCtx.stroke();
      }
      for (let y = 0; y < height; y += 36) {
        chartCtx.beginPath();
        chartCtx.moveTo(0, y);
        chartCtx.lineTo(width, y);
        chartCtx.stroke();
      }

      if (state.points.length < 2) {
        chartCtx.fillStyle = "#6f675c";
        chartCtx.font = "14px ui-monospace, monospace";
        chartCtx.fillText("waiting for MIC_ADC serial lines", 16, 28);
        return;
      }

      const maxValue = Math.max(20, ...state.points.map((point) => Math.max(point.rms, point.p2p)));
      drawSeries("p2p", maxValue, "#ba6b12", 2);
      drawSeries("rms", maxValue, "#176e89", 3);
    }

    /**
     * @brief 绘制单条指标曲线。
     *
     * 调用方法：drawChart() 分别绘制 p2p 和 rms 时调用。
     * @param {string} key 指标字段名。
     * @param {number} maxValue 当前窗口用于缩放的最大值。
     * @param {string} color 曲线颜色。
     * @param {number} lineWidth 曲线宽度。
     */
    function drawSeries(key, maxValue, color, lineWidth) {
      const width = els.chart.clientWidth;
      const height = els.chart.clientHeight;
      const step = width / Math.max(1, MAX_POINTS - 1);

      chartCtx.beginPath();
      chartCtx.strokeStyle = color;
      chartCtx.lineWidth = lineWidth;
      state.points.forEach((point, index) => {
        const x = width - (state.points.length - 1 - index) * step;
        const y = height - (point[key] / maxValue) * (height - 24) - 12;
        if (index === 0) {
          chartCtx.moveTo(x, y);
        } else {
          chartCtx.lineTo(x, y);
        }
      });
      chartCtx.stroke();
    }

    /**
     * @brief 连接本地 Python 串口桥接服务。
     *
     * 调用方法：页面启动时自动调用；用户点击“本地桥接”按钮时也可手动重连。
     * 该模式由 serve.py 读取 /dev/cu.usbmodem*，网页只接收 /events 推送，不需要浏览器串口权限。
     */
    async function connectBridge() {
      stopDemo();
      await disconnectSerial();
      disconnectBridge(false);
      state.bridgeWanted = true;
      clearBridgeReconnectTimer();

      state.eventSource = new EventSource("/events");
      els.streamMode.textContent = "bridge";
      setStatus(true, "桥接等待数据");

      state.eventSource.onopen = () => {
        if (state.bridgeWanted) {
          setStatus(true, "桥接已连接");
        }
      };

      state.eventSource.onmessage = (event) => {
        try {
          const payload = JSON.parse(event.data);
          if (payload.type === "line") {
            ingestLine(payload.line);
          } else if (payload.type === "status") {
            setStatus(true, payload.port ? `桥接 ${payload.port}` : payload.message);
          }
        } catch (error) {
          ingestLine(`WEB_ERROR,bridge parse failed: ${error.message}`);
        }
      };

      state.eventSource.onerror = () => {
        if (!state.bridgeWanted) {
          return;
        }
        if (state.eventSource) {
          state.eventSource.close();
          state.eventSource = null;
        }
        scheduleBridgeReconnect("桥接重连中");
      };
    }

    /**
     * @brief 断开本地 Python 串口桥接服务。
     *
     * 调用方法：切换到 Web Serial、模拟模式或页面需要释放 SSE 连接时调用。
     * @param {boolean} updateUi true 表示同步更新页面状态。
     */
    function disconnectBridge(updateUi = true) {
      state.bridgeWanted = false;
      clearBridgeReconnectTimer();
      if (!state.eventSource) {
        if (updateUi) {
          els.streamMode.textContent = "idle";
          setStatus(false, "未连接");
        }
        return;
      }
      state.eventSource.close();
      state.eventSource = null;
      if (updateUi) {
        els.streamMode.textContent = "idle";
        setStatus(false, "未连接");
      }
    }

    /**
     * @brief 打开浏览器串口选择器并开始读取 ESP32 输出。
     *
     * 调用方法：用户点击“连接 ESP32”或“全部串口”按钮时调用；浏览器要求必须由用户手势触发。
     * @param {boolean} useFilters true 表示只显示 Espressif/常见 USB 转串口设备。
     */
    async function connectSerial(useFilters = true) {
      if (!("serial" in navigator)) {
        setStatus(false, "浏览器不支持 Web Serial");
        return;
      }

      stopDemo();
      disconnectBridge(false);
      try {
        const requestOptions = useFilters ? { filters: ESP_SERIAL_FILTERS } : {};
        state.port = await navigator.serial.requestPort(requestOptions);
        await state.port.open({ baudRate: Number(els.baudRate.value) });
        const decoder = new TextDecoderStream();
        state.readableClosed = state.port.readable.pipeTo(decoder.writable);
        state.reader = decoder.readable.getReader();
        state.reading = true;
        els.streamMode.textContent = "serial";
        setStatus(true, "串口已连接");
        readSerialLoop();
      } catch (error) {
        setStatus(false, "连接失败");
        ingestLine(`WEB_ERROR,${error.message}`);
      }
    }

    /**
     * @brief 持续读取串口字节流并按行拆分。
     *
     * 调用方法：connectSerial() 成功打开串口后自动调用。
     */
    async function readSerialLoop() {
      while (state.reading && state.reader) {
        try {
          const { value, done } = await state.reader.read();
          if (done) {
            break;
          }
          state.partialLine += value;
          const lines = state.partialLine.split(/\r?\n/);
          state.partialLine = lines.pop() || "";
          for (const line of lines) {
            ingestLine(line);
          }
        } catch (error) {
          ingestLine(`WEB_ERROR,${error.message}`);
          break;
        }
      }
      await disconnectSerial();
    }

    /**
     * @brief 关闭当前串口连接。
     *
     * 调用方法：用户点击“断开”按钮、读取循环结束或发生异常时调用。
     */
    async function disconnectSerial() {
      state.reading = false;
      if (state.reader) {
        try {
          await state.reader.cancel();
        } catch (_) {
        }
        state.reader.releaseLock();
        state.reader = null;
      }
      if (state.readableClosed) {
        await state.readableClosed.catch(() => {});
        state.readableClosed = null;
      }
      if (state.port) {
        await state.port.close().catch(() => {});
        state.port = null;
      }
      els.streamMode.textContent = "idle";
      setStatus(false, "未连接");
    }

    /**
     * @brief 断开当前正在使用的数据源。
     *
     * 调用方法：用户点击“断开”按钮时调用；会同时覆盖本地桥接、浏览器串口和模拟模式。
     */
    async function disconnectCurrentSource() {
      stopDemo();
      disconnectBridge(true);
      await disconnectSerial();
    }

    /**
     * @brief 启动本地模拟数据源。
     *
     * 调用方法：用户点击“模拟”按钮时调用，用于没有硬件时检查页面绘图和解析。
     */
    async function startDemo() {
      if (state.demoTimer) {
        stopDemo();
        return;
      }

      await disconnectSerial();
      disconnectBridge(false);
      let tick = 0;
      state.demoTimer = window.setInterval(() => {
        tick += 1;
        const speaking = Math.sin(tick / 18) > 0.25;
        const rms = Math.round((speaking ? 140 : 22) + Math.random() * (speaking ? 80 : 16));
        const p2p = Math.round(rms * (speaking ? 5.1 : 3.3));
        const avg = 2038 + Math.round(Math.sin(tick / 9) * 18);
        const min = Math.max(0, avg - Math.floor(p2p / 2));
        const max = Math.min(4095, avg + Math.ceil(p2p / 2));
        ingestLine(`MIC_ADC,gpio=6,unit=ADC1,channel=5,samples=3200,last=${avg},min=${min},max=${max},avg=${avg},rms=${rms},p2p=${p2p}`);
      }, 200);
      els.demoBtn.textContent = "停止模拟";
      els.streamMode.textContent = "demo";
      setStatus(true, "模拟数据");
    }

    /**
     * @brief 停止本地模拟数据源。
     *
     * 调用方法：再次点击“模拟”按钮或开始真实串口连接前调用。
     */
    function stopDemo() {
      if (!state.demoTimer) {
        return;
      }
      window.clearInterval(state.demoTimer);
      state.demoTimer = null;
      els.demoBtn.textContent = "模拟";
      els.streamMode.textContent = "idle";
      setStatus(false, "未连接");
    }

    /**
     * @brief 清空页面上的曲线、读数和原始日志。
     *
     * 调用方法：用户点击“清空”按钮时调用。
     */
    function clearData() {
      state.points = [];
      state.logLines = [];
      state.totalSamples = 0;
      state.totalLines = 0;
      els.rawLog.textContent = "";
      els.sampleCount.textContent = "0 samples";
      els.lineCount.textContent = "0 lines";
      for (const id of ["rmsValue", "p2pValue", "avgValue", "lastValue", "minValue", "maxValue"]) {
        els[id].textContent = "0";
      }
      document.documentElement.style.setProperty("--meter", "0%");
      drawChart();
    }

    els.bridgeBtn.addEventListener("click", connectBridge);
    els.connectBtn.addEventListener("click", () => connectSerial(true));
    els.allPortsBtn.addEventListener("click", () => connectSerial(false));
    els.disconnectBtn.addEventListener("click", disconnectCurrentSource);
    els.demoBtn.addEventListener("click", startDemo);
    els.clearBtn.addEventListener("click", clearData);

    if (!("serial" in navigator)) {
      els.supportText.textContent = "当前浏览器没有 Web Serial";
      els.connectBtn.disabled = true;
      els.allPortsBtn.disabled = true;
    }

    new ResizeObserver(resizeCanvas).observe(els.chart);
    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("pagehide", () => disconnectBridge(false));
    resizeCanvas();
    connectBridge();
  </script>
</body>
</html>
